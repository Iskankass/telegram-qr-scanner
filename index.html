<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            word-wrap: break-word;
            color: var(--tg-theme-button-color, #3390ec);
        }
        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Скрыта по умолчанию */
        }
    </style>
</head>
<body>
    <h2>Сканер QR-кодов</h2>
    <p id="result">Ожидание QR-кода...</p>
    
    <button id="scanBtn" onclick="startScan()">Открыть сканер снова</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;

        // Сообщаем клиенту Telegram, что приложение готово
        tg.ready();
        
        // Разворачиваем приложение на весь экран
        tg.expand();

        // Функция запуска нативного сканера Telegram
      function startScan() {
            tg.showScanQrPopup({
                text: "Наведите камеру на QR-код оборудования"
            }, function(qrText) {
                
                // Отображаем на всякий случай на экране
                document.getElementById('result').innerText = "Оборудование найдено. Возвращаем в чат...";
                
                // 1. Отправляем считанный текст (или ID оборудования) обратно боту
                tg.sendData(qrText); 
                
                // 2. Закрываем Web App. Это автоматически вернет человека в диалог с ботом
                tg.close();
                
                // Возвращаем true для закрытия самого попапа сканера
                return true; 
            });
        }

        // Автоматический запуск камеры при открытии Web App
        // Используем небольшую задержку (500 мс), чтобы Telegram успел полностью отрисовать интерфейс
        setTimeout(() => {
            startScan();
            
            // Показываем кнопку на случай, если пользователь нажмет "Отмена" в сканере
            document.getElementById('scanBtn').style.display = 'inline-block';
        }, 500);
    </script>
</body>
</html>
